[tools]
tinytex = "latest"
"github:WGUNDERWOOD/tex-fmt" = "latest"
"github:orhun/git-cliff" = "latest"
hk = "latest"
"pipx:bibfish" = "latest"
pkl = "latest"
taplo = "latest"

[hooks]
# Note that this will not uninstall the package if it is later removed from the
# postinstall section. In the case where `package-a` was installed and used in the
# tex files, then removed both places but later re-introduced in the tex files, it may
# successfully run on your machine since it was never uninstalled, but fail on other
# fresh installations. This is where the CI/CD pipeline will come to our rescue.
#
# Since the postinstall hook always run "postinstall", new additions to the list (say
# you suddenly needed `package-b`) will automatically be installed. However, this make
# each `mise install` a bit slower as the hook command runs also when no new packages
# are added.
#
# Some typical non-default tinytex packages.
postinstall = """
tlmgr update --self
tlmgr install \
  cm-super \
  underscore \
  type1cm \
  mhchem \
  enumitem
# Needed for class reviewresponse and creating diffs
tlmgr install \
  latexdiff \
  koma-script \
  tcolorbox \
  caption \
  pdfcol \
  tikzfill \
  grfext \
  ulem \
  siunitx \
  mwe \
  lipsum \
  listings
"""

[env]
LOCAL_BIB_PATH = "" # override in mise.local.toml with your personal global bib path

[tasks.compile]
description = "Compile all documents for local development."
dir = "{{ config_root }}/tex/"
run = [{ task = "localize-bib-paths" }, { task = "*:compile" }]

[tasks."main:compile"]
depends = ["main:*"]
description = "Build/compile the manuscript."
dir = "{{ config_root }}/tex/"
outputs = ["main.pdf", "main.bbl"]
run = "latexmk -pdf -g -f -silent -recorder- main.tex"
sources = [
  "main.tex",
  "main.bib",
  # "file1.pdf",              # Fig 1
]

[tasks."main:update-refs"]
description = "Update the bibliography file."
dir = "{{ config_root }}/tex/"
outputs = ["main.bib"]
run = "bibfish -c 'cite,citet,citep,citeA' -f main.tex {{ env.LOCAL_BIB_PATH }}.bib main.bib"
sources = ["main.tex"]

[tasks.localize-bib-paths]
description = "Restore full local bibliography path in all tex files for editor completion."
dir = "{{ config_root }}/tex/"
hide = true
run = """
#!/usr/bin/env bash
set -euo pipefail
[[ -z "${LOCAL_BIB_PATH:-}" ]] && exit 0
for tex in *.tex; do
  [[ -f "$tex" ]] || continue
  [[ "$tex" == diff*.tex ]] && continue
  grep -qF "bibliography{${LOCAL_BIB_PATH}}" "$tex" || \
    sed -i "s|bibliography{[^}]*}|bibliography{${LOCAL_BIB_PATH}}|" "$tex"
done
"""

[tasks.check-bib-filepath]
description = "Check that base names are used in bibliography commands (exits 1 if any file would change)."
dir = "{{ config_root }}/tex/"
hide = true
run = """
#!/usr/bin/env bash
set -euo pipefail
failed=0
for tex in *.tex; do
  [[ -f "$tex" ]] || continue
  [[ "$tex" == diff*.tex ]] && continue
  base="${tex%.tex}"
  if ! grep -q bibliography "$tex"; then
    continue
  fi
  grep -qF "bibliography{${base}}" "$tex" || failed=1
done
exit $failed
"""

[tasks.fix-bib-filepath]
description = "Make sure that the base name is used in the bibliography command."
dir = "{{ config_root }}/tex/"
hide = true
run = """
#!/usr/bin/env bash
set -euo pipefail
for tex in *.tex; do
  [[ -f "$tex" ]] || continue
  [[ "$tex" == diff*.tex ]] && continue
  base="${tex%.tex}"
  if ! grep -q bibliography "$tex"; then
    continue
  fi
  grep -qF "bibliography{${base}}" "$tex" || \
    sed -i "s|bibliography{[^}]*}|bibliography{${base}}|" "$tex"
done
"""
